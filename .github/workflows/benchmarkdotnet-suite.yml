name: BenchmarkDotNet Performance Suite
run-name: BenchmarkDotNet suite (${{ github.event.release.tag_name || github.ref_name }})

on:
  workflow_dispatch:
    inputs:
      benchmark_filter:
        description: 'BenchmarkDotNet filter (e.g., *minimal*, *Jint*)'
        required: false
        default: '*'
      jroc_package_version:
        description: 'Published Jroc package version to benchmark (for example 0.9.5)'
        required: false
        default: ''
  release:
    types: [published]

jobs:
  benchmarkdotnet-suite:
    name: ${{ matrix.benchmark_name }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - benchmark_name: KrackenExecutionBenchmarks
            mode_argument: --kracken
            artifact_suffix: kracken
          - benchmark_name: JrocPhasedBenchmarks
            mode_argument: --phased
            artifact_suffix: jroc-phased
          - benchmark_name: JavaScriptRuntimeBenchmarks
            mode_argument: ''
            artifact_suffix: javascript-runtime
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      
      - name: Determine jroc benchmark package mode
        shell: bash
        env:
          INPUT_JROC_PACKAGE_VERSION: ${{ github.event.inputs.jroc_package_version || '' }}
        run: |
          set -euo pipefail

          package_version=""

          if [ "${{ github.event_name }}" = "release" ]; then
            package_version="${{ github.event.release.tag_name }}"
          elif [ -n "$INPUT_JROC_PACKAGE_VERSION" ]; then
            package_version="$INPUT_JROC_PACKAGE_VERSION"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [[ "${GITHUB_REF_NAME}" == v* ]]; then
            package_version="${GITHUB_REF_NAME}"
          fi

          package_version="${package_version#v}"

          if [ -n "$package_version" ]; then
            echo "Using published Jroc packages version: $package_version"
            echo "USE_PUBLISHED_JROC_PACKAGES=true" >> "$GITHUB_ENV"
            echo "JROC_PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          else
            echo "Using checked-out source tree projects for Jroc benchmarks"
            echo "USE_PUBLISHED_JROC_PACKAGES=false" >> "$GITHUB_ENV"
          fi

      - name: Wait for published Jroc packages
        if: env.USE_PUBLISHED_JROC_PACKAGES == 'true' && github.event_name == 'release'
        uses: actions/github-script@v8
        with:
          script: |
            const workflowId = 'publish-tool.yml';
            const targetVersion = process.env.JROC_PACKAGE_VERSION;
            const targetTag = `v${targetVersion}`;
            const deadlineMs = 20 * 60 * 1000;
            const pollMs = 15 * 1000;
            const startedAt = Date.now();

            while (Date.now() - startedAt < deadlineMs) {
              const response = await github.request('GET /repos/{owner}/{repo}/actions/runs', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 50
              });

              const matchingRuns = response.data.workflow_runs.filter(candidate =>
                candidate.path === '.github/workflows/publish-tool.yml' &&
                (candidate.display_title ?? '').includes(targetTag)
              );

              if (matchingRuns.length === 0) {
                core.info(`Waiting for ${workflowId} run for ${targetTag} to appear...`);
                await new Promise(resolve => setTimeout(resolve, pollMs));
                continue;
              }

              const successfulRun = matchingRuns.find(candidate =>
                candidate.status === 'completed' && candidate.conclusion === 'success');
              if (successfulRun) {
                core.info(`Found successful ${workflowId} run ${successfulRun.id}; proceeding to package restore.`);
                return;
              }

              const inProgressRun = matchingRuns.find(candidate => candidate.status !== 'completed');
              if (inProgressRun) {
                core.info(`Waiting for ${workflowId} run ${inProgressRun.id} to complete for ${targetTag}...`);
                await new Promise(resolve => setTimeout(resolve, pollMs));
                continue;
              }

              const latestCompleted = matchingRuns[0];
              core.info(`No successful ${workflowId} run yet for ${targetTag}. Latest completed run ${latestCompleted.id} concluded ${latestCompleted.conclusion ?? 'n/a'}. Retrying...`);
              await new Promise(resolve => setTimeout(resolve, pollMs));
            }

            throw new Error(`Timed out waiting for a successful ${workflowId} run for ${targetTag}.`);

      - name: Wait for NuGet package availability
        if: env.USE_PUBLISHED_JROC_PACKAGES == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node scripts/waitForNuGetPackageVersions.js \
            --version "${JROC_PACKAGE_VERSION}" \
            --package Jroc.Core \
            --package Jroc.Runtime

      - name: Restore benchmark project
        shell: bash
        run: |
          set -euo pipefail
          cd tests/performance/Benchmarks

          if [ "${USE_PUBLISHED_JROC_PACKAGES}" = "true" ]; then
            tries=20
            delay=30

            for i in $(seq 1 $tries); do
              dotnet nuget locals http-cache --clear || true

              if dotnet restore Benchmarks.csproj \
                --no-cache \
                -p:UsePublishedJrocPackages=true \
                -p:JrocPackageVersion="${JROC_PACKAGE_VERSION}"; then
                echo "Restored Jroc benchmark packages ${JROC_PACKAGE_VERSION}"
                exit 0
              fi

              echo "Attempt $i/$tries: Jroc benchmark packages ${JROC_PACKAGE_VERSION} not available yet on NuGet; waiting ${delay}s..."
              sleep $delay
            done

            echo "Failed to restore Jroc benchmark packages ${JROC_PACKAGE_VERSION} from NuGet after $tries attempts" >&2
            exit 1
          fi

          dotnet restore Benchmarks.csproj

      - name: Build benchmark project
        shell: bash
        run: |
          set -euo pipefail
          cd tests/performance/Benchmarks

          MSBUILD_ARGS=()
          if [ "${USE_PUBLISHED_JROC_PACKAGES}" = "true" ]; then
            MSBUILD_ARGS+=(-p:UsePublishedJrocPackages=true -p:JrocPackageVersion="${JROC_PACKAGE_VERSION}")
          fi

          dotnet build Benchmarks.csproj -c Release --no-restore "${MSBUILD_ARGS[@]}"
      
      - name: Shutdown build server
        run: |
          # Free up resources before running benchmarks
          dotnet build-server shutdown
      
      - name: Run BenchmarkDotNet Suite
        id: benchmark
        shell: bash
        env:
          BENCHMARK_MODE_ARGUMENT: ${{ matrix.mode_argument }}
          BENCHMARK_FILTER: ${{ github.event.inputs.benchmark_filter || '*' }}
        run: |
          set -euo pipefail
          cd tests/performance/Benchmarks

          DOTNET_ARGS=()
          if [ -n "$BENCHMARK_MODE_ARGUMENT" ]; then
            DOTNET_ARGS+=("$BENCHMARK_MODE_ARGUMENT")
          fi
          DOTNET_ARGS+=(--filter "$BENCHMARK_FILTER" --exporters json)

          MSBUILD_ARGS=()
          if [ "${USE_PUBLISHED_JROC_PACKAGES}" = "true" ]; then
            MSBUILD_ARGS+=(-p:UsePublishedJrocPackages=true -p:JrocPackageVersion="${JROC_PACKAGE_VERSION}")
          fi

          dotnet run --project Benchmarks.csproj -c Release --no-build "${MSBUILD_ARGS[@]}" -- "${DOTNET_ARGS[@]}"

          if [ ! -d "BenchmarkDotNet.Artifacts/results" ] || ! compgen -G "BenchmarkDotNet.Artifacts/results/*.json" > /dev/null; then
            echo "BenchmarkDotNet produced no result artifacts; failing workflow."
            exit 1
          fi

      - name: Ingest Benchmark Results to Supabase
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node tests/performance/ingestPerfToSupabase.js --source benchmarkdotnet --input tests/performance/Benchmarks/BenchmarkDotNet.Artifacts/results
      
      - name: Upload BenchmarkDotNet Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarkdotnet-results-${{ matrix.artifact_suffix }}
          path: |
            tests/performance/Benchmarks/BenchmarkDotNet.Artifacts/**/*
          retention-days: 90
      
      - name: Upload Summary Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-summary-${{ matrix.artifact_suffix }}
          path: |
            tests/performance/Benchmarks/BenchmarkDotNet.Artifacts/results/*.md
            tests/performance/Benchmarks/BenchmarkDotNet.Artifacts/results/*.html
            tests/performance/Benchmarks/BenchmarkDotNet.Artifacts/results/*.json
          retention-days: 90
      
      - name: Comment Summary on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find the markdown summary
            const artifactsDir = 'tests/performance/Benchmarks/BenchmarkDotNet.Artifacts/results';
            
            if (!fs.existsSync(artifactsDir)) {
              console.log('No benchmark results found');
              return;
            }
            
            const files = fs.readdirSync(artifactsDir);
            const mdFile = files.find(f => f.endsWith('-report.md'));
            
            if (!mdFile) {
              console.log('No markdown report found');
              return;
            }
            
            const mdPath = path.join(artifactsDir, mdFile);
            const summary = fs.readFileSync(mdPath, 'utf8');
            
            const comment = `## 📊 BenchmarkDotNet Performance Results
            
            ${summary}
            
            ---
            *Run on: ${new Date().toISOString()}*
            *Suite: ${{ matrix.benchmark_name }}*
            *Filter: ${{ github.event.inputs.benchmark_filter || 'all' }}*
            *Full results: [Download artifacts](${context.payload.repository.html_url}/actions/runs/${context.runId})*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            }).catch(err => {
              console.log('Failed to post comment:', err);
            });
