name: Canary Smoke

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: "Canary suite to run"
        required: false
        default: "pr"
        type: choice
        options:
          - pr
          - nightly

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  canary-pr:
    name: Canary PR gate
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite != 'nightly') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore dependencies
        run: |
          dotnet restore
          npm ci

      - name: Build JS2IL (Release)
        run: dotnet build Js2IL/Js2IL.csproj --no-restore -c Release

      - name: Run PR canary suite
        run: |
          npm run diff:test:canary -- \
            --output artifacts/canary-pr \
            --verbose

      - name: Upload PR canary artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canary-pr-artifacts
          path: artifacts/canary-pr
          if-no-files-found: ignore

  canary-nightly:
    name: Canary nightly suite
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'nightly') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore dependencies
        run: |
          dotnet restore
          npm ci

      - name: Build JS2IL (Release)
        run: dotnet build Js2IL/Js2IL.csproj --no-restore -c Release

      - name: Run nightly canary suite
        run: |
          npm run diff:test:canary:nightly -- \
            --output artifacts/canary-nightly \
            --verbose

      - name: Upload nightly canary artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canary-nightly-artifacts
          path: artifacts/canary-nightly
          if-no-files-found: ignore
