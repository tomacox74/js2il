name: ShapeCoverage snapshots (debug)

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore

      - name: Run ShapeCoverage GeneratorTests (allow failure)
        run: dotnet test --verbosity normal --filter "FullyQualifiedName~Js2IL.Tests.ShapeCoverage.GeneratorTests"
        continue-on-error: true

      - name: Upload ShapeCoverage snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shapecoverage-snapshots
          if-no-files-found: error
          path: |
            Js2IL.Tests/ShapeCoverage/Snapshots/*.received.*
            Js2IL.Tests/ShapeCoverage/Snapshots/*.verified.*
