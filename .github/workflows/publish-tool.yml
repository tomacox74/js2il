name: Publish compiler packages

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      NUGET_SERVER: https://api.nuget.org/v3/index.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Compute version from tag
        shell: pwsh
        run: |
          $tag = "$env:GITHUB_REF_NAME"
          if ($tag.StartsWith('v')) { $version = $tag.Substring(1) } else { $version = $tag }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore
        run: dotnet restore js2il.sln

      - name: Build
        run: dotnet build js2il.sln -c Release --no-restore

      - name: Test
        run: dotnet test js2il.sln -c Release --no-build --verbosity normal

      - name: Pack compiler packages
        shell: pwsh
        run: |
          if (Test-Path out) {
            Remove-Item out -Recurse -Force
          }

          $projects = @(
            'src/Cli/Js2IL.csproj',
            'src/Js2IL.Core/Js2IL.Core.csproj',
            'src/Js2IL.SDK/Js2IL.SDK.csproj'
          )

          foreach ($project in $projects) {
            dotnet pack $project -c Release -o out -p:ContinuousIntegrationBuild=true -p:Version=${{ env.VERSION }}
          }

      - name: Publish compiler packages to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: pwsh
        run: |
          $packageNames = @(
            "js2il.$env:VERSION.nupkg",
            "Js2IL.Core.$env:VERSION.nupkg",
            "Js2IL.SDK.$env:VERSION.nupkg"
          )

          foreach ($packageName in $packageNames) {
            $pkgPath = Join-Path 'out' $packageName
            if (-not (Test-Path $pkgPath)) {
              Write-Error "Expected package not found: $pkgPath"
              exit 1
            }

            Write-Host "Pushing $packageName to $env:NUGET_SERVER"
            dotnet nuget push --source "$env:NUGET_SERVER" --api-key "$env:NUGET_API_KEY" "$pkgPath" --skip-duplicate
          }
