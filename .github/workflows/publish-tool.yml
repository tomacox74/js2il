name: Publish coordinated packages
run-name: ${{ github.workflow }} - ${{ github.event_name }} - ${{ github.event.inputs.ref || github.event.release.tag_name || github.head_ref || github.ref_name }}

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Release tag to publish (for example v0.9.17)'
        required: false
        default: ''

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      NUGET_SERVER: https://api.nuget.org/v3/index.json
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install npm dependencies
        run: npm ci

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Compute version from tag
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.ref }}"
          if ([string]::IsNullOrWhiteSpace($ref)) {
            $ref = "$env:GITHUB_REF_NAME"
          }

          $tag = $ref.Trim()
          if ($tag.StartsWith('refs/tags/')) {
            $tag = $tag.Substring('refs/tags/'.Length)
          }
          if ($tag.Contains('/')) {
            Write-Error "Publish coordinated packages expects a release tag like v0.9.17, but got '$ref'."
            exit 1
          }
          if ($tag -notmatch '^v?\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$') {
            Write-Error "Publish coordinated packages expects a semver tag like v0.9.17, but got '$tag'."
            exit 1
          }
          if ($tag.StartsWith('v')) { $version = $tag.Substring(1) } else { $version = $tag }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore js2il.sln

      - name: Build
        run: dotnet build js2il.sln -c Release --no-restore

      - name: Validate coordinated release package set
        run: npm run release:validate

      - name: Pack coordinated packages
        shell: pwsh
        run: |
          if (Test-Path out) {
            Remove-Item out -Recurse -Force
          }

          $projects = @(
            'src/JavaScriptRuntime/JavaScriptRuntime.csproj',
            'src/Cli/Js2IL.csproj',
            'src/Js2IL.Core/Js2IL.Core.csproj',
            'src/Js2IL.SDK/Js2IL.SDK.csproj'
          )

          foreach ($project in $projects) {
            dotnet pack $project -c Release -o out -p:ContinuousIntegrationBuild=true -p:Version=${{ env.VERSION }}
          }

      - name: Publish coordinated packages to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: pwsh
        run: |
          $packageNames = @(
            "Js2IL.Runtime.$env:VERSION.nupkg",
            "js2il.$env:VERSION.nupkg",
            "Js2IL.Core.$env:VERSION.nupkg",
            "Js2IL.SDK.$env:VERSION.nupkg"
          )

          foreach ($packageName in $packageNames) {
            $pkgPath = Join-Path 'out' $packageName
            if (-not (Test-Path $pkgPath)) {
              Write-Error "Expected package not found: $pkgPath"
              exit 1
            }

            Write-Host "Pushing $packageName to $env:NUGET_SERVER"
            dotnet nuget push --source "$env:NUGET_SERVER" --api-key "$env:NUGET_API_KEY" "$pkgPath" --skip-duplicate
          }
