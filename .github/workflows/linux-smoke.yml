name: linux-smoke
run-name: Linux smoke (${{ github.event.release.tag_name || github.ref_name }})

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need full history to read tags for determining the latest release version
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Determine jroc tool version
        run: |
          set -euo pipefail
          # Use the highest semver-like tag (vX.Y.Z[-suffix]) available
          tag=$(git tag --sort=-v:refname | head -n1)
          version="${tag#v}"
          echo "Using tool version: $version"
          echo "TOOL_VERSION=$version" >> "$GITHUB_ENV"

      - name: Wait for published Jroc packages
        if: github.event_name == 'release'
        uses: actions/github-script@v8
        with:
          script: |
            const workflowId = 'publish-tool.yml';
            const targetVersion = process.env.TOOL_VERSION;
            const targetTag = `v${targetVersion}`;
            const deadlineMs = 20 * 60 * 1000;
            const pollMs = 15 * 1000;
            const startedAt = Date.now();

            while (Date.now() - startedAt < deadlineMs) {
              const response = await github.request('GET /repos/{owner}/{repo}/actions/runs', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 50
              });

              const matchingRuns = response.data.workflow_runs.filter(candidate =>
                candidate.path === '.github/workflows/publish-tool.yml' &&
                (candidate.display_title ?? '').includes(targetTag)
              );

              if (matchingRuns.length === 0) {
                core.info(`Waiting for ${workflowId} run for ${targetTag} to appear...`);
                await new Promise(resolve => setTimeout(resolve, pollMs));
                continue;
              }

              const successfulRun = matchingRuns.find(candidate =>
                candidate.status === 'completed' && candidate.conclusion === 'success');
              if (successfulRun) {
                core.info(`Found successful ${workflowId} run ${successfulRun.id}; proceeding to tool install.`);
                return;
              }

              const inProgressRun = matchingRuns.find(candidate => candidate.status !== 'completed');
              if (inProgressRun) {
                core.info(`Waiting for ${workflowId} run ${inProgressRun.id} to complete for ${targetTag}...`);
                await new Promise(resolve => setTimeout(resolve, pollMs));
                continue;
              }

              const latestCompleted = matchingRuns[0];
              core.info(`No successful ${workflowId} run yet for ${targetTag}. Latest completed run ${latestCompleted.id} concluded ${latestCompleted.conclusion ?? 'n/a'}. Retrying...`);
              await new Promise(resolve => setTimeout(resolve, pollMs));
            }

            throw new Error(`Timed out waiting for a successful ${workflowId} run for ${targetTag}.`);

      - name: Wait for NuGet package availability
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          node scripts/waitForNuGetPackageVersions.js \
            --version "$TOOL_VERSION" \
            --package jroc \
            --package Jroc.Runtime \
            --package Jroc.SDK

      - name: Install jroc tool from NuGet (specific version with retry)
        run: |
          set -euo pipefail
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          tries=20
          delay=30
          for i in $(seq 1 $tries); do
            dotnet nuget locals http-cache --clear || true
            if dotnet tool install --global jroc --version "$TOOL_VERSION"; then
              echo "Installed jroc $TOOL_VERSION"
              exit 0
            fi
            echo "Attempt $i/$tries: jroc $TOOL_VERSION not available yet on NuGet; waiting ${delay}s..."
            sleep $delay
          done
          echo "Failed to install jroc $TOOL_VERSION from NuGet after $tries attempts" >&2
          exit 1

      - name: Show jroc version
        run: |
          # Older previews may not support --version; fall back to help
          jroc --version || jroc -h || true

      - name: Convert tests/simple.js to IL
        run: jroc tests/simple.js -o out

      - name: Run generated assembly and verify output
        run: |
          set -e
          output=$(dotnet out/simple.dll)
          echo "Program output:" 
          echo "$output"
          if ! echo "$output" | grep -i "x is"; then
            echo "Smoke test failed: expected output containing 'x is'"
            exit 1
          fi

      - name: Build Jint and Okojo comparison projects
        run: |
          cd tests/performance/JintComparison
          dotnet build -c Release
          cd ../OkojoComparison
          dotnet build -c Release

      - name: Shutdown build server
        run: |
          # Kill VBCSCompiler and other build processes to free up resources
          # before running performance benchmarks
          dotnet build-server shutdown

      - name: Run Performance Comparison
        run: |
          cd tests/performance
          node RunComparison.js

      - name: Ingest Prime Comparison Results to Supabase
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node tests/performance/ingestPerfToSupabase.js --source prime-script --input tests/performance/results.json

      - name: Build and run Domino sample
        run: |
          set -euo pipefail
          output=$(dotnet run --project samples/Domino/Domino.csproj -c Release -p:JrocRuntimePackageVersion="$TOOL_VERSION" 2>&1) || { echo "$output"; exit 1; }
          echo "Program output:"
          echo "$output"
          echo "$output" | grep -i "title=JROC Domino Sample"
          echo "$output" | grep -i "links=2"

      - name: Build and run Picocolors sample
        run: |
          set -euo pipefail
          output=$(dotnet run --project samples/Picocolors/Picocolors.csproj -c Release -p:JrocRuntimePackageVersion="$TOOL_VERSION" 2>&1) || { echo "$output"; exit 1; }
          echo "Program output:"
          echo "$output"
          echo "$output" | grep "red="
          echo "$output" | grep "green="
          echo "$output" | grep "done"

      - name: Build and run Basic sample
        run: |
          set -euo pipefail
          output=$(dotnet run --project samples/Basic/host/Basic.csproj -c Release -p:JrocRuntimePackageVersion="$TOOL_VERSION" 2>&1) || { echo "$output"; exit 1; }
          echo "Program output:"
          echo "$output"
          echo "$output" | grep "version="
          echo "$output" | grep "1+2="

      - name: Build and run Typed sample
        run: |
          set -euo pipefail
          output=$(dotnet run --project samples/Typed/host/Typed.csproj -c Release -p:JrocRuntimePackageVersion="$TOOL_VERSION" 2>&1) || { echo "$output"; exit 1; }
          echo "Program output:"
          echo "$output"
          echo "$output" | grep "version="
          echo "$output" | grep "add(1,2)="
          echo "$output" | grep "counter.add(5)="
          echo "$output" | grep "counter.value="
          echo "$output" | grep "addAsync(1,2)="
          echo "$output" | grep "created.add(1)="
