name: linux-smoke
run-name: Linux smoke (${{ github.event.release.tag_name || github.ref_name }})

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need full history to read tags for determining the latest release version
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Determine js2il tool version
        run: |
          set -euo pipefail
          # Use the highest semver-like tag (vX.Y.Z[-suffix]) available
          tag=$(git tag --sort=-v:refname | head -n1)
          version="${tag#v}"
          echo "Using tool version: $version"
          echo "TOOL_VERSION=$version" >> "$GITHUB_ENV"

      - name: Wait for published Js2IL packages
        if: github.event_name == 'release'
        uses: actions/github-script@v8
        with:
          script: |
            const workflowId = 'publish-tool.yml';
            const targetSha = process.env.GITHUB_SHA;
            const targetRef = process.env.GITHUB_REF_NAME;
            const deadlineMs = 20 * 60 * 1000;
            const pollMs = 15 * 1000;
            const startedAt = Date.now();

            while (Date.now() - startedAt < deadlineMs) {
              const response = await github.request('GET /repos/{owner}/{repo}/actions/runs', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                event: 'push',
                per_page: 50
              });

              const run = response.data.workflow_runs.find(candidate =>
                candidate.path === '.github/workflows/publish-tool.yml' &&
                candidate.head_sha === targetSha &&
                candidate.head_branch === targetRef);

              if (!run) {
                core.info(`Waiting for ${workflowId} run for ${targetRef} (${targetSha}) to appear...`);
                await new Promise(resolve => setTimeout(resolve, pollMs));
                continue;
              }

              core.info(`Found ${workflowId} run ${run.id} with status=${run.status} conclusion=${run.conclusion ?? 'n/a'}`);

              if (run.status !== 'completed') {
                await new Promise(resolve => setTimeout(resolve, pollMs));
                continue;
              }

              if (run.conclusion !== 'success') {
                throw new Error(`${workflowId} run ${run.id} completed with conclusion=${run.conclusion}`);
              }

              core.info(`${workflowId} completed successfully; proceeding to tool install.`);
              return;
            }

            throw new Error(`Timed out waiting for ${workflowId} to publish packages for ${targetRef}.`);

      - name: Wait for NuGet package availability
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          node scripts/waitForNuGetPackageVersions.js \
            --version "$TOOL_VERSION" \
            --package js2il \
            --package Js2IL.Runtime \
            --package Js2IL.SDK

      - name: Install js2il tool from NuGet (specific version with retry)
        run: |
          set -euo pipefail
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
          tries=20
          delay=30
          for i in $(seq 1 $tries); do
            dotnet nuget locals http-cache --clear || true
            if dotnet tool install --global js2il --version "$TOOL_VERSION"; then
              echo "Installed js2il $TOOL_VERSION"
              exit 0
            fi
            echo "Attempt $i/$tries: js2il $TOOL_VERSION not available yet on NuGet; waiting ${delay}s..."
            sleep $delay
          done
          echo "Failed to install js2il $TOOL_VERSION from NuGet after $tries attempts" >&2
          exit 1

      - name: Show js2il version
        run: |
          # Older previews may not support --version; fall back to help
          js2il --version || js2il -h || true

      - name: Convert tests/simple.js to IL
        run: js2il tests/simple.js -o out

      - name: Run generated assembly and verify output
        run: |
          set -e
          output=$(dotnet out/simple.dll)
          echo "Program output:" 
          echo "$output"
          if ! echo "$output" | grep -i "x is"; then
            echo "Smoke test failed: expected output containing 'x is'"
            exit 1
          fi

      - name: Build Jint and Okojo comparison projects
        run: |
          cd tests/performance/JintComparison
          dotnet build -c Release
          cd ../OkojoComparison
          dotnet build -c Release

      - name: Shutdown build server
        run: |
          # Kill VBCSCompiler and other build processes to free up resources
          # before running performance benchmarks
          dotnet build-server shutdown

      - name: Run Performance Comparison
        run: |
          cd tests/performance
          node RunComparison.js

      - name: Ingest Prime Comparison Results to Supabase
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node tests/performance/ingestPerfToSupabase.js --source prime-script --input tests/performance/results.json

      - name: Build and run Hosting.Domino sample
        run: |
          set -euo pipefail
          output=$(dotnet run --project samples/Hosting.Domino/host/Hosting.Domino.csproj -c Release -p:Js2ILRuntimePackageVersion="$TOOL_VERSION" 2>&1) || { echo "$output"; exit 1; }
          echo "Program output:"
          echo "$output"
          echo "$output" | grep -i "title=JS2IL Domino Sample"
          echo "$output" | grep -i "links=2"

      - name: Build and run Hosting.Basic sample
        run: |
          set -euo pipefail
          output=$(dotnet run --project samples/Hosting.Basic/host/Hosting.Basic.csproj -c Release -p:Js2ILRuntimePackageVersion="$TOOL_VERSION" 2>&1) || { echo "$output"; exit 1; }
          echo "Program output:"
          echo "$output"
          echo "$output" | grep "version="
          echo "$output" | grep "1+2="

      - name: Build and run Hosting.Typed sample
        run: |
          set -euo pipefail
          output=$(dotnet run --project samples/Hosting.Typed/host/Hosting.Typed.csproj -c Release -p:Js2ILRuntimePackageVersion="$TOOL_VERSION" 2>&1) || { echo "$output"; exit 1; }
          echo "Program output:"
          echo "$output"
          echo "$output" | grep "version="
          echo "$output" | grep "add(1,2)="
          echo "$output" | grep "counter.add(5)="
          echo "$output" | grep "counter.value="
          echo "$output" | grep "addAsync(1,2)="
          echo "$output" | grep "created.add(1)="
